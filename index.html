<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=2304, height=768">
<link rel="stylesheet" href="https://use.typekit.net/vsp7vcb.css">

<title>Ranking Grupo K</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:768px;
    height:768px;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

#bgVideo{
    position:absolute;
    top:0;
    left:0;
    width:768px;
    height:768px;
    object-fit:cover;
    z-index:1;
}

#contenido{
    position:absolute;
    width:2304px;
    height:768px;
    z-index:2;
}

/* Posiciones de los equipos */
/* NOMBRES */

.equipo{

    position:absolute;

    font-family:"remora-sans-w5", sans-serif;
    font-weight:900;
    font-style:normal;

    font-size:43px;

    color:#012bff;

    width:700px;
    height:70px;

    display:flex;
    align-items:center;
    justify-content:center;

    white-space:nowrap;
    text-transform: uppercase;
}

/* PORCENTAJES */

.porcentaje{

    position:absolute;

    font-family:"remora-sans-w5", sans-serif;
    font-weight:900;
    font-style:normal;

    font-size:42px;

    color:#0a2957;

    white-space:nowrap;

    z-index:9999;

    border:2px solid red; /* temporal */
}
#v1{
    left:574px;
    top:415px;
}

#v2{
    left:573px;
    top:473px;
}

#v3{
    left:573px;
    top:531px;
}

#v4{
    left:573px;
    top:589px;

}

/* Coordenadas independientes */

#p1{
    left:2px;
    top:411px;
}

#p2{
    left:2px;
    top:462px;
}

#p3{
    left:2px;
    top:526px;
}

#p4{
    left:2px;
    top:584px;
}


</style>
</head>

<body>

<video
    id="bgVideo"
    autoplay
    muted
    loop
    playsinline>
    <source src="fondo.mp4" type="video/mp4">
</video>

<div id="contenido">

<div id="p1" class="equipo"></div>
<div id="p2" class="equipo"></div>
<div id="p3" class="equipo"></div>
<div id="p4" class="equipo"></div>

<div id="v1" class="porcentaje"></div>
<div id="v2" class="porcentaje"></div>
<div id="v3" class="porcentaje"></div>
<div id="v4" class="porcentaje"></div>

</div>

<script>

const API_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnQe-iffkDRGCLcL9WIw_Y8I-HDwFCwarw_f5-Vr8__6vLEYLry-Gw5_GVd_1W0XQTug0cKTqc6WLxW_bx6GTEd2D9RnhkUO2KxQ2OsIFt-i-fS-hNgtVrCFH-y2657jxfNFmdMtVUgu04qPItU08rD-5CQu5oxSP9Af7dH0JXR1da2BXQpK0L8d1z3HFHJFXKzej_Q_hIAInAvVrMmpcvV3aSJ3ml9VTznhfZbQ_7_JpKCoTnM4m2PRskTuQIo0PDhkVJkmJ_datNgT-Z2VuCX78WVa0g&lib=MT1LZbfHctya4uObz9hnmzqeEHa1C_Htb";


    async function cargarRanking(){

    try{

        const response = await fetch(API_URL);
        const ranking = await response.json();

        document.getElementById("p1").innerText =
            ranking[0]?.equipo || "";

        document.getElementById("p2").innerText =
            ranking[1]?.equipo || "";

        document.getElementById("p3").innerText =
            ranking[2]?.equipo || "";

        document.getElementById("p4").innerText =
            ranking[3]?.equipo || "";

        document.getElementById("v1").innerText =
            (ranking[0]?.porcentaje ?? 0) + "%";

        document.getElementById("v2").innerText =
            (ranking[1]?.porcentaje ?? 0) + "%";

        document.getElementById("v3").innerText =
            (ranking[2]?.porcentaje ?? 0) + "%";

        document.getElementById("v4").innerText =
            (ranking[3]?.porcentaje ?? 0) + "%";

    }catch(error){

        console.error(error);

    }


}

cargarRanking();

/* Actualiza cada minuto */
setInterval(cargarRanking, 60000);

</script>

</body>
</html>
